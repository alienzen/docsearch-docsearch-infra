worker_processes auto;
events { worker_connections 2048; }

http {
    include      mime.types;
    default_type application/octet-stream;
    sendfile     on;
    gzip         on;

    limit_req_zone $binary_remote_addr zone=search:10m rate=30r/m;

    upstream api_backend {
        server api:8000;
        keepalive 32;
    }

    upstream ui_backend {
        server ui:80;
        keepalive 8;
    }

    # ── Redirection HTTP → HTTPS ───────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS ─────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name docsearch.local;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header X-Frame-Options        DENY;
        add_header X-Content-Type-Options nosniff;

        client_max_body_size 50M;

        # ──────────────────────────────────────────────────────
        # INJECTION DU HEADER X-User APRÈS VALIDATION SSO
        #
        # En production avec AgentConnect / Keycloak :
        #   - auth_request valide le token JWT
        #   - $user est extrait du token et transmis à l'API
        #   - L'API utilise ce header pour filtrer par ACL
        #
        # En développement (sans SSO) :
        #   - Commenter le bloc auth_request
        #   - Définir DEV_USER dans .env (docsearch-api) pour
        #     simuler un utilisateur
        # ──────────────────────────────────────────────────────

        # ── Interface web statique (docsearch-ui) ──────────────
        location / {
            proxy_pass         http://ui_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── API de recherche (docsearch-api) ───────────────────
        location /search {
            limit_req zone=search burst=20 nodelay;

            # SSO — décommenter en production :
            # auth_request      /auth/validate;
            # auth_request_set  $user $upstream_http_x_authenticated_user;
            # proxy_set_header  X-User $user;

            proxy_pass       http://api_backend;
            proxy_set_header Host $host;
            # Nécessaire pour la page de stats admin (/admin/search-logs) —
            # sans ça, l'API ne verrait que l'IP interne de Nginx, pas celle
            # du client (voir get_client_ip() dans docsearch-api).
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location ~ ^/(document|health)(/|$) {
            # SSO — décommenter en production :
            # auth_request      /auth/validate;
            # auth_request_set  $user $upstream_http_x_authenticated_user;
            # proxy_set_header  X-User $user;

            proxy_pass       http://api_backend;
            proxy_set_header Host $host;
        }

        location /saved-searches {
            # SSO — décommenter en production :
            # auth_request      /auth/validate;
            # auth_request_set  $user $upstream_http_x_authenticated_user;
            # proxy_set_header  X-User $user;

            proxy_pass       http://api_backend;
            proxy_set_header Host $host;
        }

        # Notifications in-app des recherches sauvegardées en alerte
        # (🔔 Alertes, voir index.html) — /alerts, /alerts/{id}/seen,
        # /alerts/mark-all-seen.
        location /alerts {
            # SSO — décommenter en production :
            # auth_request      /auth/validate;
            # auth_request_set  $user $upstream_http_x_authenticated_user;
            # proxy_set_header  X-User $user;

            proxy_pass       http://api_backend;
            proxy_set_header Host $host;
        }

        # Collections de documents personnelles ("📋 Mes collections", voir index.html)
        location /collections {
            # SSO — décommenter en production :
            # auth_request      /auth/validate;
            # auth_request_set  $user $upstream_http_x_authenticated_user;
            # proxy_set_header  X-User $user;

            proxy_pass       http://api_backend;
            proxy_set_header Host $host;
        }

        # ── Mesure de satisfaction (pouce, tracking de clic, NPS,
        # suggestions) — /admin/engagement-config, /admin/nps-summary et
        # /admin/suggestions sont déjà couverts par "location /admin/".
        location ~ ^/(engagement-config|feedback|click|nps|suggestions)$ {
            proxy_pass       http://api_backend;
            proxy_set_header Host $host;
        }

        # Présélection de sources avant recherche (voir index.html)
        location = /searchable-sources {
            proxy_pass       http://api_backend;
            proxy_set_header Host $host;
        }

        # Facettes SQL personnalisées actives (ex: bureau/fonction),
        # pour la syntaxe avancée de la barre de recherche (voir index.html)
        location = /custom-facets {
            proxy_pass       http://api_backend;
            proxy_set_header Host $host;
        }

        # Bascules d'interface (ex: visibilité du lien Assistant IA) —
        # /admin/ui-config est déjà couvert par "location /admin/".
        location = /ui-config {
            proxy_pass       http://api_backend;
            proxy_set_header Host $host;
        }

        # Visibilité des liens Administration/Statistiques (voir index.html)
        location = /is-admin {
            proxy_pass       http://api_backend;
            proxy_set_header Host $host;
        }

        # Composition des gabarits d'affichage des résultats (public — voir
        # index.html:renderCard()) — /admin/display-styles est déjà couvert
        # par "location /admin/".
        location = /display-styles {
            proxy_pass       http://api_backend;
            proxy_set_header Host $host;
        }

        # ── Endpoint de validation SSO (Keycloak / AgentConnect) ─
        # location /auth/validate {
        #     internal;
        #     proxy_pass              http://keycloak:8080/auth/realms/docsearch/protocol/openid-connect/userinfo;
        #     proxy_pass_request_body off;
        #     proxy_set_header        Content-Length "";
        #     proxy_set_header        Authorization $http_authorization;
        #     # Le serveur SSO doit retourner X-Authenticated-User: <login>
        # }

        location /ask {
            # Endpoint RAG (chat.html) — timeout étendu pour l'inférence LLM
            proxy_pass          http://api_backend;
            proxy_read_timeout  120s;
        }

        location /metrics {
            proxy_pass          http://api_backend;
            proxy_set_header    Connection "";
            proxy_http_version  1.1;
            proxy_buffering     off;
            proxy_cache         off;
            proxy_read_timeout  3600s;
        }

        location /api/preview/ {
            # SSO — décommenter en production :
            # auth_request      /auth/validate;
            # auth_request_set  $user $upstream_http_x_authenticated_user;
            # proxy_set_header  X-User $user;

            proxy_pass         http://api_backend;
            proxy_read_timeout 120s;
            proxy_buffering    off;
        }

        # ── Panneau d'administration — même API, contrôle d'accès
        # supplémentaire fait côté application (groupe LDAP admin,
        # voir docsearch-api/admin_auth.py). Le header X-User injecté
        # ici par le SSO est indispensable : sans lui, admin_auth.py
        # refuse systématiquement (401).
        location /admin/ {
            # SSO — décommenter en production :
            # auth_request      /auth/validate;
            # auth_request_set  $user $upstream_http_x_authenticated_user;
            # proxy_set_header  X-User $user;

            proxy_pass         http://api_backend;
            proxy_read_timeout 60s;
        }

        location /kibana/ {
            allow  172.20.0.0/16;
            deny   all;
            proxy_pass http://kibana:5601/;
        }
    }
}
