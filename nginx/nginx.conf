worker_processes auto;
events { worker_connections 2048; }

http {
    include      mime.types;
    default_type application/octet-stream;
    sendfile     on;
    gzip         on;

    limit_req_zone $binary_remote_addr zone=search:10m rate=30r/m;

    upstream api_backend {
        server api:8000;
        keepalive 32;
    }

    upstream ui_backend {
        server ui:80;
        keepalive 8;
    }

    # ── Redirection HTTP → HTTPS ───────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS ─────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name docsearch.local;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header X-Frame-Options        DENY;
        add_header X-Content-Type-Options nosniff;

        client_max_body_size 50M;

        # ──────────────────────────────────────────────────────
        # INJECTION DU HEADER X-User APRÈS VALIDATION SSO
        #
        # En production avec AgentConnect / Keycloak :
        #   - auth_request valide le token JWT
        #   - $user est extrait du token et transmis à l'API
        #   - L'API utilise ce header pour filtrer par ACL
        #
        # En développement (sans SSO) :
        #   - Commenter le bloc auth_request
        #   - Définir DEV_USER dans .env (docsearch-api) pour
        #     simuler un utilisateur
        # ──────────────────────────────────────────────────────

        # ── Interface web statique (docsearch-ui) ──────────────
        location / {
            proxy_pass         http://ui_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── API de recherche (docsearch-api) ───────────────────
        location /search {
            limit_req zone=search burst=20 nodelay;

            # SSO — décommenter en production :
            # auth_request      /auth/validate;
            # auth_request_set  $user $upstream_http_x_authenticated_user;
            # proxy_set_header  X-User $user;

            proxy_pass       http://api_backend;
            proxy_set_header Host $host;
        }

        location ~ ^/(document|health)(/|$) {
            # SSO — décommenter en production :
            # auth_request      /auth/validate;
            # auth_request_set  $user $upstream_http_x_authenticated_user;
            # proxy_set_header  X-User $user;

            proxy_pass       http://api_backend;
            proxy_set_header Host $host;
        }

        # ── Endpoint de validation SSO (Keycloak / AgentConnect) ─
        # location /auth/validate {
        #     internal;
        #     proxy_pass              http://keycloak:8080/auth/realms/docsearch/protocol/openid-connect/userinfo;
        #     proxy_pass_request_body off;
        #     proxy_set_header        Content-Length "";
        #     proxy_set_header        Authorization $http_authorization;
        #     # Le serveur SSO doit retourner X-Authenticated-User: <login>
        # }

        location /ask {
            # Endpoint RAG (chat.html) — timeout étendu pour l'inférence LLM
            proxy_pass          http://api_backend;
            proxy_read_timeout  120s;
        }

        location /metrics {
            proxy_pass          http://api_backend;
            proxy_set_header    Connection "";
            proxy_http_version  1.1;
            proxy_buffering     off;
            proxy_cache         off;
            proxy_read_timeout  3600s;
        }

        location /api/preview/ {
            # SSO — décommenter en production :
            # auth_request      /auth/validate;
            # auth_request_set  $user $upstream_http_x_authenticated_user;
            # proxy_set_header  X-User $user;

            proxy_pass         http://api_backend;
            proxy_read_timeout 120s;
            proxy_buffering    off;
        }

        location /kibana/ {
            allow  172.20.0.0/16;
            deny   all;
            proxy_pass http://kibana:5601/;
        }
    }
}
